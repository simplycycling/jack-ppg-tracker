name: Jack Hughes PPG Tracker

on:
  # Runs at 12:30 AM ET nightly (5:30 AM UTC — covers EST and EDT)
  schedule:
    - cron: "30 5 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:

jobs:
  post-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: go build -o hughes-tracker .

      - name: Run tracker
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
        run: ./hughes-tracker
